<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-left">
    <div class="hero-eyebrow reveal">Supervisorline℠ · Performance Support · Frontline Supervision</div>
    <h1 class="hero-title reveal reveal-delay-1">The moment arrives.<br><em>Built for the supervisor</em><br>in the room.</h1>
    <p class="hero-sub reveal reveal-delay-2">Supervisors face live, high-stakes moments with no time to search a policy manual. Supervisorline℠ surfaces the complete response — routing tier, steps, what to say, when to stop — in the moment it is needed.</p>
    <a href="#situations" class="hero-cta reveal reveal-delay-3">View situations →</a>
  </div>
  <div class="hero-right">
    <div class="hero-stat reveal reveal-delay-1">
      <div class="hero-stat-num">47.8%</div>
      <div class="hero-stat-text">of all EEOC charges are retaliation claims — often triggered by a supervisor's response to a complaint.</div>
      <div class="hero-stat-source">EEOC / OnPay, 2026</div>
    </div>
    <div class="hero-stat reveal reveal-delay-2">
      <div class="hero-stat-num">41%</div>
      <div class="hero-stat-text">of frontline managers changed jobs in the past year — often because they felt unprepared for what the role required.</div>
      <div class="hero-stat-source">Fountain Frontline Report, 2025</div>
    </div>
    <div class="hero-stat reveal reveal-delay-3">
      <div class="hero-stat-num">Personal</div>
      <div class="hero-stat-text">liability. Managers and supervisors can be held personally liable for FLSA violations — including when they did not know the violations occurred.</div>
      <div class="hero-stat-source">Burr &amp; Forman, 2025</div>
    </div>
  </div>
</section>

<!-- ROUTING GATE -->
<div class="routing-gate">
  <div class="routing-inner">
    <div class="routing-eyebrow">Routing Architecture · Nova v1 · Session 136</div>
    <h2 class="routing-title">Every situation has a routing tier.<br>Know yours before you act.</h2>
    <div class="routing-tiers">
      <div class="routing-tier">
        <span class="tier-badge tier-1-badge">Tier 1 — Supervisor Handles</span>
        <h3>Supervisor Owns and Resolves</h3>
        <p>No protected class allegation. No formal complaint. No leave or accommodation disclosure. Within the supervisor's documented authority. HR notification is discretionary.</p>
      </div>
      <div class="routing-tier">
        <span class="tier-badge tier-2-badge">Tier 2 — Escalate to HR</span>
        <h3>Stop. Contact HR Before Next Action.</h3>
        <p>Employee discloses a medical condition, pregnancy, disability, or accommodation need. Any protected class allegation raised, even informally. Termination or PIP with a leave or accommodation in the background. Supervisor is uncertain whether an action would constitute retaliation.</p>
      </div>
      <div class="routing-tier">
        <span class="tier-badge tier-3-badge">Tier 3 — External Reporting</span>
        <h3>Legal / Compliance Now.</h3>
        <p>EEOC charge received. DOL WHD complaint filed. NLRB charge. OSHA complaint or recordable injury. Employee has retained legal counsel. No substantive decision is made without legal review.</p>
      </div>
    </div>
    <div class="routing-hard-rule">
      ⛔ Hard rule: The supervisor cannot make a termination, demotion, or discipline decision that involves any Tier 2 condition without HR sign-off. Any Tier 3 condition goes to Legal/Compliance immediately — not HR, not the supervisor.
    </div>
  </div>
</div>

<!-- SITUATIONS -->
<main id="main-content">
<section class="sit-section" id="situations">
  <div class="sit-section-eyebrow">Situations</div>
  <h2 class="sit-section-title">25 Situations — All 5 Categories</h2>
  <div class="sit-section-meta">Sourced from 3-track primary research · Sessions 131 + 136 · 7 governing statutes · 5 categories: Performance &amp; Discipline · Leave &amp; Accommodation · Conflict &amp; Conduct · Mental Health &amp; Crisis · Safety · Wages &amp; Pay · Rudolph CX LLC</div>

  <div class="sit-grid">

    <!-- S-01: Verbal Coaching -->
    <div class="sit-card">
      <div class="sit-card-header" onclick="toggleSit(this)" role="button" tabindex="0" aria-expanded="false">
        <div class="sit-card-num">S-01</div>
        <div class="sit-card-title">Verbal Coaching Conversation — Performance Issue</div>
        <div class="sit-card-tags">
          <span class="sit-tag sit-tag-t1">Tier 1</span>
        </div>
        <div class="sit-card-chevron">&#8964;</div>
      </div>
      <div class="sit-card-body">
        <div class="routing-badge routing-badge-t1">Tier 1 — Supervisor Handles · Escalate to Tier 2 if protected class emerges</div>
        <ol class="sit-steps">
          <li><span class="sit-step-num">1.</span><span>Before the conversation: confirm the specific performance issue, dates, and observable behaviors. Do not enter a coaching conversation based on impressions — document the specific facts you will address.</span></li>
          <li><span class="sit-step-num">2.</span><span>Open with the purpose: "I want to talk with you about [specific behavior/performance issue]. This is a coaching conversation — I want to understand your perspective and make sure we're aligned on expectations." Do not open with accusation.</span></li>
          <li><span class="sit-step-num">3.</span><span>State the specific issue, with dates and observable examples. "On [date], I observed [specific behavior]. The expectation is [standard]. The gap I'm seeing is [specific gap]."</span></li>
          <li><span class="sit-step-num">4.</span><span>Ask — do not assume. "Is there something going on that I should know about?" Listen fully before responding. If the employee discloses a medical condition, leave need, or protected class issue: <strong>stop the coaching conversation immediately and route to HR (Tier 2).</strong></span></li>
          <li><span class="sit-step-num">5.</span><span>If no Tier 2 trigger: confirm the expectation going forward, the support you will provide, and the timeline for follow-up. Document in your own supervisor notes: date, issue discussed, employee's response, agreed next steps. Do not over-document or create a paper trail that implies termination is imminent unless that is the actual next step.</span></li>
        </ol>
        <div class="sit-callout sit-callout-warn">
          <div class="sit-callout-label">&#9888; NLRA Section 7 — Right to Representation</div>
          If the employee asks to have a coworker present for a conversation they reasonably believe could result in discipline, they may have Weingarten rights if they are in a union. Non-union employees have no statutory right to representation during an investigative interview, but your organization's policy may grant it. Know your policy before the conversation.
        </div>
        <div class="sit-callout sit-callout-halt">
          <div class="sit-callout-label">&#9888; Immediate Tier 2 Triggers</div>
          If the employee discloses a medical condition, mentions FMLA, references a pregnancy or accommodation need, or raises a discrimination or harassment allegation during the coaching conversation — stop immediately. Document that you stopped. Contact HR before any next step.
        </div>
        <div class="sit-card-reg">Title VII · ADA · FMLA · NLRA Section 7 · Rudolph CX Methodology</div>
      </div>
