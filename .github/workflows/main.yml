name: Generate File Hashes

on:
  workflow_dispatch:

jobs:
  hash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print SHA-256 hashes
        run: |
          sha256sum index.html aidline.html caseline.html chartline_guide.html lendline.html
